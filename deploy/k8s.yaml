apiVersion: apps/v1
kind: Deployment
metadata: { name: sbomx, labels: { app: sbomx } }
spec:
  replicas: 1
  selector: { matchLabels: { app: sbomx } }
  template:
    metadata: { labels: { app: sbomx } }
    spec:
      containers:
        - name: sbomx
          image: ghcr.io/cognis-digital/sbomx:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: sbomx }
spec:
  selector: { app: sbomx }
  ports: [{ port: 80, targetPort: 8000 }]
